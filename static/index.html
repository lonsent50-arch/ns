<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Novel Studio — 工业级AI网文工作台</title>
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Novel Studio">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/bookshelf.css">
    <link rel="stylesheet" href="/static/css/workspace.css">
    <link rel="stylesheet" href="/static/css/panels.css">
    <link rel="stylesheet" href="/static/css/publish.css">
    <link rel="stylesheet" href="/static/css/import.css">
    <link rel="stylesheet" href="/static/css/config.css">
    <link rel="stylesheet" href="/static/css/responsive.css">
    <script>(function(){var u=navigator.userAgent;window._isCapacitor=!!(window.Capacitor||u.includes('Capacitor'));window._isIOS=/iPhone|iPad|iPod/.test(u);window._isAndroid=/Android/.test(u);document.documentElement.classList.add(window._isCapacitor?'native-app':'browser');})();</script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <!-- ═══ 部署配置：前端自动解耦 API 地址 ═══ -->
    <script>
    // 前后端同域部署，API 请求直接走相对路径，无需跨域代理
    </script>
</head>
<body>
<a href="#main-content" class="skip-link">跳到主内容</a>

<!-- ═══ 视图: 书架首页 ═══ -->
<div class="ns-view" id="view-bookshelf" style="display:flex;">
    <div class="bookshelf-container">
        <header class="bookshelf-header">
            <div class="bs-logo">
                <div class="bs-logo-icon">NS</div>
                <div>
                    <div class="bs-logo-text">Novel Studio</div>
                    <div class="bs-logo-sub">工业级 AI 网文工作台</div>
                </div>
            </div>
            <div class="bs-search">
                <input type="text" class="bs-search-input" id="bs-search" placeholder="搜索项目..." oninput="Bookshelf.filter()">
            </div>
            <div class="bs-actions">
                <button class="bs-btn bs-btn-import" onclick="NS.navigate('#import')">📂 导入</button>
                <div class="bs-credits" id="bs-credits" title="点击充值" onclick="NS._showRechargeDialog()">
                    <span class="bs-credits-balance" id="bs-credits-balance">💰 --</span>
                    <span class="bs-credits-usage" id="bs-credits-usage"></span>
                </div>
                <div id="auth-area" style="display:flex;align-items:center;"></div>
            </div>
        </header>
        <div class="bs-tabs" id="bs-tabs">
            <button class="bs-tab active" data-filter="all" onclick="Bookshelf.setFilter('all', this)">全部</button>
            <button class="bs-tab" data-filter="active" onclick="Bookshelf.setFilter('active', this)">创作中</button>
            <button class="bs-tab" data-filter="done" onclick="Bookshelf.setFilter('done', this)">已完结</button>
            <button class="bs-tab" data-filter="draft" onclick="Bookshelf.setFilter('draft', this)">草稿</button>
        </div>
        <div class="bs-grid" id="bs-grid">
            <div class="empty-state"><div class="es-icon">📦</div><div class="es-title">暂无项目</div><div class="es-desc">点击"新建项目"开始创作</div></div>
        </div>
    </div>
</div>

<!-- ═══ 视图: 三栏工作台 ═══ -->
<div class="ns-view" id="view-workspace" style="display:none;">
    <div class="workspace-layout">
        <!-- Left Panel: Volumes + Chapter Tree -->
        <div class="ws-left" id="ws-left">
            <div class="ws-left-header">
                <button class="ws-back-btn" onclick="NS.navigate('#bookshelf')">&larr; 书架</button>
                <div class="ws-project-title" id="ws-project-title">加载中...</div>
            </div>
            <div class="ws-volumes" id="ws-volumes"></div>
            <div class="ws-tree-actions">
                <button class="ws-tree-btn" onclick="Tree.addVolume()">+ 新建卷</button>
                <button class="ws-tree-btn" onclick="Tree.addChapter()">+ 新建章</button>
            </div>
            <div class="ws-progress" id="ws-progress">
                <div class="ws-progress-bar"><div class="ws-progress-fill" id="ws-progress-fill" style="width:0%"></div></div>
                <div class="ws-progress-text" id="ws-progress-text">0/0章</div>
            </div>
            <div class="ws-left-nav">
                <button class="ws-nav-btn" onclick="Characters.show()">👤 角色管理</button>
                <button class="ws-nav-btn" onclick="Memory.show()">🧠 记忆系统</button>
                <button class="ws-nav-btn" onclick="NS.navigate('#publish/' + NS.getState('projectId'))">📦 发布上线</button>
            </div>
        </div>
        <!-- Center Panel: Editor -->
        <div class="ws-center" id="ws-center">
            <div class="ws-editor-toolbar">
                <input type="text" class="ws-editor-title" id="ws-editor-title" placeholder="章节标题" onchange="Workspace.saveChapter()">
                <span class="ws-save-status" id="ws-save-status">💾 已保存</span>
                <div class="ws-editor-actions">
                    <button class="ws-action-btn" onclick="AIPanel.continue()" title="AI续写">🤖</button>
                    <button class="ws-action-btn" onclick="Workspace.toggleFullscreen()" title="全屏">⛶</button>
                    <button class="ws-action-btn" onclick="AIPanel.polish()" title="润色">✨</button>
                    <button class="ws-action-btn" onclick="AIPanel.writeChapter()" title="写本章">✍️</button>
                    <button class="ws-action-btn ws-action-delete" onclick="Workspace.deleteChapter()" title="删除">🗑</button>
                </div>
                <span class="ws-wordcount" id="ws-wordcount">0 字</span>
                <div class="ws-chapter-nav">
                    <button onclick="Workspace.navChapter(-1)">◀</button>
                    <span id="ws-ch-nav">1/1</span>
                    <button onclick="Workspace.navChapter(1)">▶</button>
                </div>
            </div>
            <div class="ws-editor-body" id="ws-editor-body" contenteditable="true" placeholder="开始写作..." oninput="Workspace.onInput()"></div>
        </div>
        <!-- Right Panel: AI Assistant -->
        <div class="ws-right" id="ws-right">
            <div class="ws-panel-card" id="panel-ai-actions">
                <div class="ws-panel-header" onclick="this.parentElement.classList.toggle('collapsed')">🤖 AI 辅助</div>
                <div class="ws-panel-body">
                    <button class="ai-quick-btn" onclick="AIPanel.continue()">续写下一段</button>
                    <button class="ai-quick-btn" onclick="AIPanel.polish()">润色当前段</button>
                    <button class="ai-quick-btn" onclick="AIPanel.writeChapter()">写完整章</button>
                    <button class="ai-quick-btn" onclick="AIPanel.expand()">扩写选中内容</button>
                </div>
            </div>
            <div class="ws-panel-card" id="panel-characters">
                <div class="ws-panel-header" onclick="this.parentElement.classList.toggle('collapsed')">👤 活跃角色</div>
                <div class="ws-panel-body" id="panel-active-chars">加载中...</div>
            </div>
            <div class="ws-panel-card" id="panel-world">
                <div class="ws-panel-header" onclick="this.parentElement.classList.toggle('collapsed')">🌐 世界观约束</div>
                <div class="ws-panel-body" id="panel-world-rules">加载中...</div>
            </div>
            <div class="ws-panel-card" id="panel-pov">
                <div class="ws-panel-header" onclick="this.parentElement.classList.toggle('collapsed')">🎯 POV 锁定</div>
                <div class="ws-panel-body" id="panel-pov-control">
                    <select id="pov-select" onchange="AIPanel.lockPOV(this.value)" style="width:100%;padding:6px;background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;">
                        <option value="">不锁定</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ═══ 视图: 发布模块 ═══ -->
<div class="ns-view" id="view-publish" style="display:none;">
    <div class="publish-container" id="publish-container"></div>
</div>

<!-- ═══ 视图: 导入向导 ═══ -->
<div class="ns-view" id="view-import" style="display:none;">
    <div class="import-container" id="import-container"></div>
</div>

<!-- ═══ 视图: AI 配置 ═══ -->
<div class="ns-view" id="view-ai-config" style="display:none;">
    <div class="config-container" id="config-container"></div>
</div>

<!-- Global containers -->
<div id="modal-overlay" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeModal()"></div>
<div id="toast-container" class="toast-container"></div>

<script src="/static/js/core.js"></script>
<script src="/static/js/bookshelf.js"></script>
<script src="/static/js/workspace.js"></script>
<script src="/static/js/tree.js"></script>
<script src="/static/js/ai-panel.js"></script>
<script src="/static/js/characters.js"></script>
<script src="/static/js/memory.js"></script>
<script src="/static/js/publish.js"></script>
<script src="/static/js/import.js"></script>
<script src="/static/js/ai-config.js"></script>
<script src="/static/js/supabase-auth.js"></script>
</body>
</html>
